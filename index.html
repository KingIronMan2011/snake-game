<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#030810">
<title>ARCADE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{--bg:#030810;--snake:#00ffaa;--accent:#00c8ff;--glow-g:0 0 8px #00ffaa,0 0 24px #00ffaa66;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);min-height:100vh;min-height:100dvh;font-family:'Share Tech Mono',monospace;
  color:#7799aa;display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow-y:auto;overscroll-behavior:none;user-select:none;
  padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,170,.012) 2px,rgba(0,255,170,.012) 4px);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 20% 50%,rgba(0,200,255,.05) 0%,transparent 70%),
             radial-gradient(ellipse 70% 50% at 80% 50%,rgba(0,255,170,.05) 0%,transparent 70%);}
.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;
  gap:clamp(20px,5vw,48px);padding:clamp(24px,6vw,48px) clamp(16px,5vw,32px);width:100%;max-width:800px;}
.header{text-align:center;}
.header .tag{font-size:clamp(.55rem,2vw,.65rem);letter-spacing:.35em;color:#334455;margin-bottom:8px;}
.header h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(2rem,10vw,3.8rem);
  letter-spacing:.2em;color:var(--snake);text-shadow:var(--glow-g);animation:flicker 4s ease-in-out infinite;line-height:1.1;}
@keyframes flicker{0%,90%,100%{opacity:1}92%{opacity:.85}94%{opacity:1}96%{opacity:.75}98%{opacity:1}}
.header .sub{margin-top:8px;font-size:clamp(.6rem,2.5vw,.75rem);letter-spacing:.18em;color:#334455;}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr));
  gap:clamp(10px,3vw,16px);width:100%;}
.game-card{position:relative;background:#060f20;border:1px solid #0e2035;border-radius:10px;
  padding:clamp(16px,4vw,28px) clamp(14px,3vw,22px) clamp(14px,3vw,22px);
  display:flex;flex-direction:column;align-items:flex-start;gap:8px;cursor:pointer;
  text-decoration:none;color:inherit;transition:border-color .2s,transform .15s,box-shadow .2s;
  overflow:hidden;min-height:120px;}
.game-card::before{content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(0,255,170,.04) 0%,transparent 60%);opacity:0;transition:opacity .2s;}
.game-card::after{content:'';position:absolute;top:0;right:0;width:36px;height:36px;
  background:linear-gradient(225deg,rgba(0,255,170,.12) 0%,transparent 60%);border-radius:0 10px 0 0;}
@media(hover:hover){
  .game-card:hover{border-color:var(--snake);transform:translateY(-3px);
    box-shadow:0 8px 32px rgba(0,255,170,.12),0 0 0 1px rgba(0,255,170,.15);}
  .game-card:hover::before{opacity:1;}
  .game-card:hover .card-arrow{color:var(--snake);transform:translateX(4px);}
}
.game-card:active:not(.coming-soon){transform:scale(.97);border-color:var(--snake);box-shadow:0 4px 20px rgba(0,255,170,.15);}
.card-icon{font-size:clamp(1.8rem,5vw,2.2rem);line-height:1;filter:drop-shadow(0 0 6px rgba(0,255,170,.4));}
.card-name{font-family:'Orbitron',sans-serif;font-size:clamp(.7rem,2.5vw,.8rem);font-weight:700;letter-spacing:.15em;color:var(--snake);}
.card-desc{font-size:clamp(.58rem,2vw,.62rem);letter-spacing:.06em;color:#445566;line-height:1.6;flex:1;}
.card-footer{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:4px;}
.card-badge{font-size:clamp(.5rem,1.8vw,.55rem);letter-spacing:.1em;padding:3px 9px;border-radius:3px;border:1px solid;}
.badge-playable{color:var(--snake);border-color:rgba(0,255,170,.35);background:rgba(0,255,170,.06);}
.badge-soon{color:#334455;border-color:#1a2a3a;}
.card-arrow{font-size:.8rem;color:#1a3050;transition:color .2s,transform .2s;}
.game-card.coming-soon{opacity:.4;cursor:default;pointer-events:none;}
.footer{font-size:clamp(.52rem,2vw,.6rem);letter-spacing:.15em;color:#1a2a3a;text-align:center;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">SELECT YOUR GAME</div>
    <h1>ARCADE</h1>
    <div class="sub">More games coming soon</div>
  </div>
  <div class="game-grid">
    <a class="game-card" href="snake-game.html">
      <div class="card-icon">🐍</div>
      <div class="card-name">NEON SNAKE</div>
      <div class="card-desc">Classic snake with a neon twist. Shop upgrades, perks, and endless fun.</div>
      <div class="card-footer">
        <span class="card-badge badge-playable">PLAYABLE</span>
        <span class="card-arrow">▶</span>
      </div>
    </a>
    <div class="game-card coming-soon">
      <div class="card-icon">👾</div>
      <div class="card-name">???</div>
      <div class="card-desc">Something new is being built in the lab...</div>
      <div class="card-footer">
        <span class="card-badge badge-soon">COMING SOON</span>
        <span class="card-arrow">▶</span>
      </div>
    </div>
    <div class="game-card coming-soon">
      <div class="card-icon">🎮</div>
      <div class="card-name">???</div>
      <div class="card-desc">Another game in the works. Stay tuned.</div>
      <div class="card-footer">
        <span class="card-badge badge-soon">COMING SOON</span>
        <span class="card-arrow">▶</span>
      </div>
    </div>
  </div>
  <div class="footer">ARCADE · Built with Claude</div>
</div>
</body>
</html>
