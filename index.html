<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #030810;
  --snake: #00ffaa;
  --accent: #00c8ff;
  --gold: #ffd700;
  --glow-g: 0 0 8px #00ffaa, 0 0 24px #00ffaa66;
  --glow-b: 0 0 8px #00c8ff, 0 0 24px #00c8ff66;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Share Tech Mono', monospace;
  color: #7799aa;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,255,170,.012) 2px, rgba(0,255,170,.012) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Ambient bg glow */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%, rgba(0,200,255,.04) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 50%, rgba(0,255,170,.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 48px;
  padding: 40px 20px;
  width: 100%;
  max-width: 800px;
}

/* Header */
.header { text-align: center; }

.header .tag {
  font-size: .65rem;
  letter-spacing: .4em;
  color: #334455;
  margin-bottom: 10px;
}

.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  letter-spacing: .25em;
  color: var(--snake);
  text-shadow: var(--glow-g);
  animation: flicker 4s ease-in-out infinite;
}

@keyframes flicker {
  0%, 90%, 100% { opacity: 1; }
  92% { opacity: .85; }
  94% { opacity: 1; }
  96% { opacity: .75; }
  98% { opacity: 1; }
}

.header .sub {
  margin-top: 8px;
  font-size: .75rem;
  letter-spacing: .2em;
  color: #334455;
}

/* Game grid */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  width: 100%;
}

/* Game card */
.game-card {
  position: relative;
  background: #060f20;
  border: 1px solid #0e2035;
  border-radius: 8px;
  padding: 28px 20px 22px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: border-color .25s, transform .2s, box-shadow .25s;
  overflow: hidden;
}

.game-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,255,170,.04) 0%, transparent 60%);
  opacity: 0;
  transition: opacity .25s;
}

.game-card:hover {
  border-color: var(--snake);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(0,255,170,.12), 0 0 0 1px rgba(0,255,170,.15);
}

.game-card:hover::before { opacity: 1; }

.game-card:active { transform: translateY(-1px); }

/* Corner accent */
.game-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 40px; height: 40px;
  background: linear-gradient(225deg, rgba(0,255,170,.12) 0%, transparent 60%);
  border-radius: 0 8px 0 0;
}

.card-icon {
  font-size: 2.2rem;
  line-height: 1;
  filter: drop-shadow(0 0 6px rgba(0,255,170,.4));
}

.card-name {
  font-family: 'Orbitron', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  letter-spacing: .18em;
  color: var(--snake);
}

.card-desc {
  font-size: .62rem;
  letter-spacing: .07em;
  color: #445566;
  line-height: 1.6;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  margin-top: 4px;
}

.card-badge {
  font-size: .55rem;
  letter-spacing: .12em;
  padding: 2px 8px;
  border-radius: 2px;
  border: 1px solid;
}

.badge-playable {
  color: var(--snake);
  border-color: rgba(0,255,170,.35);
  background: rgba(0,255,170,.06);
}

.badge-soon {
  color: #334455;
  border-color: #1a2a3a;
  background: transparent;
}

.card-arrow {
  font-size: .8rem;
  color: #1a3050;
  transition: color .2s, transform .2s;
}

.game-card:hover .card-arrow {
  color: var(--snake);
  transform: translateX(4px);
}

/* Coming soon card style */
.game-card.coming-soon {
  opacity: .45;
  cursor: default;
  pointer-events: none;
}

/* Footer */
.footer {
  font-size: .6rem;
  letter-spacing: .15em;
  color: #1a2a3a;
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="tag">SELECT YOUR GAME</div>
    <h1>ARCADE</h1>
    <div class="sub">More games coming soon</div>
  </div>

  <div class="game-grid">

    <!-- Snake -->
    <a class="game-card" href="snake-game.html">
      <div class="card-icon">🐍</div>
      <div class="card-name">NEON SNAKE</div>
      <div class="card-desc">Classic snake with a neon twist. Shop upgrades, perks, and endless fun.</div>
      <div class="card-footer">
        <span class="card-badge badge-playable">PLAYABLE</span>
        <span class="card-arrow">▶</span>
      </div>
    </a>

    <!-- Placeholder 2 -->
    <div class="game-card coming-soon">
      <div class="card-icon">👾</div>
      <div class="card-name">???</div>
      <div class="card-desc">Something new is being built in the lab...</div>
      <div class="card-footer">
        <span class="card-badge badge-soon">COMING SOON</span>
        <span class="card-arrow">▶</span>
      </div>
    </div>

    <!-- Placeholder 3 -->
    <div class="game-card coming-soon">
      <div class="card-icon">🎮</div>
      <div class="card-name">???</div>
      <div class="card-desc">Another game in the works. Stay tuned.</div>
      <div class="card-footer">
        <span class="card-badge badge-soon">COMING SOON</span>
        <span class="card-arrow">▶</span>
      </div>
    </div>

  </div>

  <div class="footer">ARCADE · Built with Claude</div>
</div>
</body>
</html>
