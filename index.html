<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030810" />
    <link rel="icon" type="image/x-icon" href="/arcade-website/favicon-arcade.ico" />
    <link rel="icon" type="image/svg+xml" href="/arcade-website/favicon-arcade.svg" />
    <link rel="apple-touch-icon" href="/arcade-website/apple-touch-icon-arcade.png" />
    <!-- Fonts preloaded as link tag so CSS @import can't block rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <!-- Hard-code dark background so it shows immediately even before CSS bundle loads -->
    <style>html,body{background:#030810;color:#8eaabb}</style>
    <title>ARCADE</title>
    <script>
      // Restore path after GitHub Pages 404 redirect
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var url = new URL(redirect);
          var path = url.pathname + url.search + url.hash;
          window.history.replaceState(null, '', path);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
